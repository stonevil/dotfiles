mounts:
- location: "~"
  writable: false

images:
- location: "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2"
  arch: "x86_64"
  digest: "sha256:28680fe5b371a5a82ebf43a31926e086a168e59949d03969c5093e7071f90b7f"
- location: "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/aarch64/images/Fedora-Cloud-Base-Generic-44-1.7.aarch64.qcow2"
  arch: aarch64
  digest: "sha256:55c60a3b80d3616a08705afd0459e75fe9f03c54aba7a46e4002a41a72fa0d5b"

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux -o pipefail
    dnf install -y sudo bash zsh curl wget git containerd neovim python3-neovim
    systemctl enable --now containerd
    nerdctl run --privileged --rm tonistiigi/binfmt --install all
    dnf autoremove -y
- mode: user
  script: |
    #!/bin/bash
    mkdir -p "$HOME/.local/bin"
    export BINDIR="$HOME/.local/bin"
    sh -c "$(curl -fsLS get.chezmoi.io)"
    mkdir -p "$HOME/.local/share/"
    [ ! -d "$HOME/.local/share/chezmoi" ] && git clone https://github.com/stonevil/dotfiles.git "$HOME/.local/share/chezmoi"

probes:
- script: |
    #!/bin/bash
    set -eux -o pipefail
    if ! timeout 30s bash -c "until command -v zsh >/dev/null 2>&1; do sleep 3; done"; then
      echo >&2 "zsh is not installed yet"
      exit 1
    fi
  hint: See "/var/log/cloud-init-output.log" in the guest

portForwards:
- guestSocket: "/run/user/{{.UID}}/containerd/containerd.sock"
  hostSocket: "{{.Dir}}/sock/containerd.sock"

env:
  CODESPACES: true
